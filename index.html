
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성일고등학교 급식 알리미</title>

    <!-- PWA 및 모바일 최적화를 위한 필수 헤더 설정 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0078d4">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <!-- 현대적인 UI 설계를 위한 Tailwind CSS & Lucide 아이콘 패키지 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* 하단에서 부드럽게 솟아오르는 슬라이드 애니메이션 효과 */
        #pwa-install-banner {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(200%);
            width: calc(100% - 32px);
            max-width: 450px;
            background-color: #ffffff;
            color: #1e293b;
            padding: 16px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            box-sizing: border-box;
            border: 1px solid #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #pwa-install-banner.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center justify-between pb-24">

    <!-- 상단 앱 네비게이션 헤더 (진단버튼 제거, 본래 디자인 복구) -->
    <header class="w-full max-w-md bg-white border-b border-slate-100 p-5 sticky top-0 z-10 shadow-sm flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center text-white shadow-md shadow-blue-200">
                <i data-lucide="bell" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-slate-800 leading-tight">성일고 급식 알리미</h1>
                <p class="text-xs text-slate-400">PWA 스마트 알림판</p>
            </div>
        </div>
    </header>

    <!-- 메인 대시보드 화면 -->
    <main class="w-full max-w-md px-5 py-6 flex-1 flex flex-col gap-6 justify-center">

        <!-- 급식 카드 UI -->
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 flex flex-col gap-4">
            <div class="flex items-center justify-between border-b border-slate-50 pb-3">
                <span class="text-sm font-semibold text-blue-600">오늘의 급식</span>
                <span class="text-xs text-slate-400" id="current-date-text">-</span>
            </div>
            <div class="min-h-[100px] flex items-center justify-center">
                <p id="meal-content" class="text-slate-600 leading-relaxed text-center whitespace-pre-line text-base font-medium">
                    🍳 잠시만 기다려 주세요...<br>오늘의 식단을 불러오는 중입니다.
                </p>
            </div>
        </div>

        <!-- 알림 구독 활성화 카드 -->
        <div class="bg-blue-50 rounded-2xl p-5 border border-blue-100/50 flex flex-col gap-3">
            <div class="flex items-start gap-3">
                <div class="p-2 bg-blue-500 text-white rounded-lg mt-0.5">
                    <i data-lucide="bell-ring" class="w-4 h-4"></i>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-blue-900">매일 아침 자동 알림장</h3>
                    <p class="text-xs text-blue-700/80 mt-1 leading-relaxed">아침 7시 35분, 당일 급식 메뉴를 푸시 알림으로 신속히 배달해 드립니다.</p>
                </div>
            </div>
            <button id="btn-subscribe" class="w-full py-3 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold rounded-xl text-sm transition-colors shadow-md shadow-blue-100 flex items-center justify-center gap-2">
                <i data-lucide="check-circle" class="w-4 h-4"></i>
                급식 알림 신청하기
            </button>
        </div>
    </main>

    <!-- 저작권 푸터 -->
    <footer class="text-center py-4 text-xs text-slate-400">
        © 2026 성일고등학교 급식 도우미
    </footer>

    <!-- 🌟 [PWA 수동 설치 유도 배너] -->
    <div id="pwa-install-banner">
        <div style="display: flex; align-items: center; gap: 12px;">
            <img src="/icon-192.png" alt="앱 아이콘" style="width: 48px; height: 48px; border-radius: 12px; object-fit: cover;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3211/3211425.png'">
            <div>
                <h4 style="margin: 0; font-size: 14px; font-weight: bold; color: #0f172a;">성일고 급식 앱 설치</h4>
                <p style="margin: 3px 0 0 0; font-size: 11px; color: #64748b;">바탕화면에 설치하고 편하게 알림을 받으세요!</p>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <button id="btn-pwa-install" style="background-color: #0078d4; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer;">설치</button>
            <button id="btn-pwa-close" style="background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; padding: 0 5px;">&times;</button>
        </div>
    </div>

    <!-- 🌟 파이어베이스 모듈 & PWA 통합 제어 자바스크립트 -->
    <script type="module">
        // 파이어베이스 최신 SDK 로드 및 연결 설정
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // 🔴 [수정 부분] 회원님의 실제 파이어베이스 Web 앱 설정 값들로 직접 변경해 주세요!
        const firebaseConfig = {
            apiKey: "",
            authDomain: "seongil-high-meal.firebaseapp.com",
            projectId: "seongil-high-meal",
            storageBucket: "seongil-high-meal.appspot.com",
            messagingSenderId: "여기에_MESSAGING_SENDER_ID_입력",
            appId: "여기에_APP_ID_입력"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'seongil-high-meal-app';
        const VAPID_PUBLIC_KEY = '여기에_VAPID_공개키_입력'; // 발송용 VAPID 공개키 입력

        let currentUser = null;

        // RULE 3: Firestore 사용 전 무조건 익명 인증 처리
        async function initAuth() {
            try {
                await signInAnonymously(auth);
            } catch (err) {
                console.error("익명 로그인 오류: ", err);
            }
        }
        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                console.log("파이어베이스 인증 완수: ", user.uid);
            }
        });

        // -------------------------------------------------------------------------
        // 1. [사용자 제공 코드] 서비스 워커 등록 처리
        // -------------------------------------------------------------------------
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/firebase-messaging-sw.js')
                .then((reg) => {
                    console.log('✅ [PWA] 서비스 워커 등록 성공: ', reg.scope);
                })
                .catch((err) => {
                    console.error('❌ [PWA] 서비스 워커 등록 실패: ', err);
                });
            });
        }

        // -------------------------------------------------------------------------
        // 2. [사용자 제공 코드] PWA 자동 설치 감지 제어 엔진
        // -------------------------------------------------------------------------
        let deferredPrompt;
        const installBanner = document.getElementById('pwa-install-banner');
        const installBtn = document.getElementById('btn-pwa-install');
        const closeBtn = document.getElementById('btn-pwa-close');

        window.addEventListener('beforeinstallprompt', (e) => {
            console.log("🔔 [PWA] 모바일 브라우저 설치 준비 완료!");
            e.preventDefault(); 
            deferredPrompt = e;  
            
            if (installBanner) {
                installBanner.classList.add('show');
            }
        });

        // 3. 사용자가 [설치] 버튼을 터치했을 때 실행
        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`[PWA] 사용자의 설치 수락 결과: ${outcome}`);
                
                deferredPrompt = null;
                if (installBanner) {
                    installBanner.classList.remove('show');
                }
            });
        }

        // 4. [닫기] 버튼 터치 시 배너 제거
        if (closeBtn && installBanner) {
            closeBtn.addEventListener('click', () => {
                installBanner.classList.remove('show');
            });
        }

        // 5. 이미 홈 화면 단독 앱(Standalone) 모드로 실행 중이라면 배너 무조건 차단
        if (window.matchMedia('(display-mode: standalone)').matches && installBanner) {
            installBanner.style.display = 'none';
        }

        // 6. 설치가 최종 완료되면 실행
        window.addEventListener('appinstalled', () => {
            console.log('🎉 [PWA] 바탕화면에 급식 앱 단축 아이콘 설치 성공!');
            if (installBanner) {
                installBanner.classList.remove('show');
            }
            deferredPrompt = null;
        });

        // -------------------------------------------------------------------------
        // 🔔 급식 알림 신청 로직 (파이어베이스 Firestore DB 저장 연동)
        // -------------------------------------------------------------------------
        const btnSubscribe = document.getElementById('btn-subscribe');
        btnSubscribe.addEventListener('click', async () => {
            if (!currentUser) {
                alert("파이어베이스 세션 인증 중입니다. 잠시만 기다렸다가 다시 신청해 주세요!");
                return;
            }

            // 1. 알림 권한 획득 여부 검사
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                alert('알림 권한이 거부되었습니다. 기기 브라우저 설정에서 알림을 허용해 주셔야 합니다!');
                return;
            }

            // 2. 푸시 구독 생성 및 획득
            try {
                const registration = await navigator.serviceWorker.ready;
                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                });

                // RULE 1, RULE 3: Strict Path와 유저 가드 규칙을 준수하여 Firestore에 주소록 저장
                const tokenKey = encodeURIComponent(subscription.endpoint).replace(/\./g, '%2E');
                const docPath = `artifacts/${appId}/public/data/push_subscriptions/${tokenKey}`;
                
                await setDoc(doc(db, docPath), {
                    subscription: JSON.stringify(subscription),
                    createdAt: new Date().toISOString()
                });

                alert('🎉 성일고 급식 푸시 알림 신청이 성공적으로 완료되었습니다! 이제 아침 7시 35분에 알림이 전달됩니다.');
            } catch (err) {
                console.error("구독 신청 및 저장 실패: ", err);
                alert('알림 등록 도중 에러가 발생했습니다. 서비스 워커가 정상적으로 작동하고 있는지 점검해 주세요.');
            }
        });

        // VAPID 키 변환용 바이너리 변환 헬퍼 함수
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        // 오늘 날짜 채우기 및 NEIS 급식 간단 로딩
        const dateText = new Date().toISOString().slice(0, 10);
        document.getElementById('current-date-text').innerText = dateText;
        const targetDateStr = dateText.replace(/-/g, '');
        
        fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=J10&SD_SCHUL_CODE=7530167&MLSV_YMD=${targetDateStr}`)
        .then(r => r.json())
        .then(data => {
            if (data.mealServiceDietInfo) {
                const row = data.mealServiceDietInfo[1].row[0];
                const cleanMenu = row.DDISH_NM.replace(/<br\/>/g, ", ").replace(/\d+\./g, '').replace(/\./g, '').trim();
                document.getElementById('meal-content').innerHTML = `🍴 <b>메뉴:</b> ${cleanMenu}<br><br>🔥 <b>칼로리:</b> ${row.CAL_INFO}`;
            } else {
                document.getElementById('meal-content').innerText = "📅 오늘은 등록된 식단 정보가 없습니다.";
            }
        })
        .catch(() => {
            document.getElementById('meal-content').innerText = "⚠️ 급식 데이터를 불러오는 과정에서 오류가 발생했습니다.";
        });
    </script>
</body>
</html>
