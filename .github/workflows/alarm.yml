name: Seongil High School Daily Meal Push Notification

on:
  workflow_dispatch: # 구글 앱스 스크립트(GAS) API 호출 및 수동 실행 전용

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # 💡 만약 레포지토리에 package.json이 있다면 아래 주석을 풀어 캐싱을 적용하세요.
          # cache: 'npm' 

      - name: Install Push Libraries
        run: |
          npm install web-push firebase-admin
          
      - name: Execute Notification Sender Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
        run: node send-alarm.js
