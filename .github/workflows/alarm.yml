
name: Seongil High School Daily Meal Push Notification

on:
  schedule:
    - cron: '20 23 * * *' # 매일 아침 7시 35분 (한국 시간)
  workflow_dispatch: # 수동 강제 테스트 버튼 생성

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Push Libraries
        run: |
          npm init -y
          npm install web-push firebase-admin node-fetch@2

      - name: Execute Notification Sender Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
        run: node send-alarm.js

